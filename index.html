<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS positions</title>
    <style>
        .a{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;
            top: 50px;
            left: 50px;
        }
        .b{
            width: 100px;
            height: 100px;
            background-color: blue;
            position: absolute;
            top: 70px;
            left: 70px;
            position: relative;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
        }
        .c{
            width: 100px;
            height: 100px;
            background-color: green;
            position: absolute;
            top: 90px;
            left: 90px;
        }
</style>
</head>
<body>
    <div class="a b c"></div>
    
</body>
</html>
